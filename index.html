<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Premium | REINVENT SAÚDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <header>
        <img src="URL_DA_LOGO" alt="Logo Reinvent Saúde" class="logo">
        <div id="clock">00:00:00</div>
    </header>

    <main class="dashboard">
        <!-- PAINEL ANTERIOR -->
        <section class="painel side" id="anterior">
            <h3>ANTERIOR</h3>
            <div class="content">
                <h2 class="nome">--</h2>
                <p class="horario">--</p>
                <small>HORÁRIO DO REGISTRO</small>
            </div>
        </section>

        <!-- PAINEL CENTRAL (CONTEMPLADO) -->
        <section class="painel central" id="contemplado">
            <h3>CONTEMPLADO</h3>
            <div class="content">
                <h1 class="nome-grande">--</h1>
                <p class="horario-grande">--</p>
                <div class="info-extra">
                    <p>Cliente: <span id="cliente">--</span></p>
                    <p>Data do Sorteio: <span id="data-consulta">--</span></p>
                </div>
            </div>
        </section>

        <!-- PAINEL POSTERIOR -->
        <section class="painel side" id="posterior">
            <h3>PRÓXIMO REGISTRO</h3>
            <div class="content">
                <h2 class="nome">--</h2>
                <p class="horario">--</p>
                <small>HORÁRIO DO REGISTRO</small>
            </div>
        </section>
    </main>

    <!-- Rodapé conforme a imagem -->
    <footer>
        <div class="footer-item">🛡️ TRANSPARÊNCIA É O NOSSO COMPROMISSO</div>
        <div class="footer-item">👥 VALORIZAMOS QUEM FAZ ACONTECER</div>
        <div class="footer-item">🏆 PARABÉNS A TODOS OS PARTICIPANTES!</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
