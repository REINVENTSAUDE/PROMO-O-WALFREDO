<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel REINVENT SAÚDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <header>
        <img src="logo.png" alt="Logo Reinvent Saúde" class="logo">
        
        <nav class="controles">
            <button onclick="trocarModo('dashboard')">MONITORAR DIA</button>
            <button onclick="trocarModo('sorteio')">SORTEAR</button>
        </nav>

        <div id="clock">00:00:00</div>
    </header>

    <main id="main-content">
        <section id="dashboard-container" class="fade-in">
            <div class="painel painel-monitorar" id="monitorar-atual">
                <h3>ATUAL</h3>
                <h1 class="nome-grande">--</h1>
            </div>
            <div class="painel painel-monitorar" id="monitorar-anterior">
                <h3>ANTERIOR</h3>
                <h2 class="nome">--</h2>
            </div>
        </section>

        <section id="sorteio-container" style="display:none;" class="fade-in">
            <div class="busca-manual">
                <input type="date" id="input-data">
                <input type="time" id="input-hora">
                <button onclick="atualizarDados()">BUSCAR</button>
            </div>

            <div class="dashboard-sorteio">
                <div class="painel side" id="anterior">
                    <h3>ANTERIOR</h3>
                    <div class="content"><h2 class="nome">--</h2><p class="horario">--</p></div>
                </div>
                <div class="painel central" id="contemplado">
                    <h3>CONTEMPLADO</h3>
                    <div class="content">
                        <h1 class="nome-grande">--</h1>
                        <p class="horario-grande">--</p>
                        <div class="info-extra">
                            <p>Cliente: <span id="cliente">--</span></p>
                        </div>
                    </div>
                </div>
                <div class="painel side" id="posterior">
                    <h3>POSTERIOR</h3>
                    <div class="content"><h2 class="nome">--</h2><p class="horario">--</p></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-item">🛡️ TRANSPARÊNCIA É O NOSSO COMPROMISSO</div>
        <div class="footer-item">👥 VALORIZAMOS QUEM FAZ ACONTECER</div>
        <div class="footer-item">🏆 PARABÉNS A TODOS OS PARTICIPANTES!</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
